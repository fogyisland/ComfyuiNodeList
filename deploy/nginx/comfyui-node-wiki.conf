# nginx reverse proxy for ComfyUI Node Wiki
# Install: sudo cp deploy/nginx/comfyui-node-wiki.conf /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx
#
# This config assumes:
# - TLS certs obtained via certbot/Let's Encrypt (paths match certbot defaults)
# - Next.js binds to 127.0.0.1:3000 (configured in comfyui-web.service)
# - Comfortable rate limit for the public conflict-check API

# Rate limiting zone (10 req/s per IP, burst 30)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Upstream: Next.js production server
upstream comfyui_web {
    server 127.0.0.1:3000 fail_timeout=0;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name nodes.example.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nodes.example.com;

    # TLS (certbot paths)
    ssl_certificate /etc/letsencrypt/live/nodes.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nodes.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/nodes.example.com/chain.pem;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/comfyui-node-wiki.access.log;
    error_log /var/log/nginx/comfyui-node-wiki.error.log;

    # Static assets (Next.js _next/static — long cache)
    location /_next/static/ {
        proxy_pass http://comfyui_web;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 365d;
    }

    # API rate-limited
    location /api/v1/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://comfyui_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }

    # Everything else (pages, login, etc.)
    location / {
        proxy_pass http://comfyui_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }
}
